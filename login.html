<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - WA Debugger</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #00ff87;
            --primary-glow: rgba(0, 255, 135, 0.3);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: radial-gradient(circle at center, #1a233a 0%, var(--bg-color) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h2 { text-align: center; margin-bottom: 24px; font-weight: 600; letter-spacing: 1px; color: #fff; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            cursor: pointer;
        }
        .remember-me input { width: auto; }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .toggle-text span { color: var(--primary); cursor: pointer; font-weight: 600; }
        .error-msg { color: #ff4a4a; font-size: 13px; margin-top: 8px; display: none; }
    </style>
</head>
<body>

<div class="container" id="authBox">
    <h2 id="formTitle">WA DEBUGGER</h2>
    <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required minlength="4">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6">
        </div>
        <div class="remember-me" id="rememberGroup">
            <input type="checkbox" id="remember">
            <label for="remember" style="margin:0;">Remember Login</label>
        </div>
        <button type="submit" id="btnSubmit">Login</button>
        <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="toggle-text">
        <span id="toggleAuth" onclick="toggleMode()">Belum punya akun? Register</span>
    </div>
</div>

<script>
    let isLogin = true;
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    if (token) window.location.href = '/';

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('formTitle').innerText = isLogin ? 'LOGIN' : 'REGISTER';
        document.getElementById('btnSubmit').innerText = isLogin ? 'Login' : 'Register';
        document.getElementById('toggleAuth').innerText = isLogin ? 'Belum punya akun? Register' : 'Sudah punya akun? Login';
        document.getElementById('rememberGroup').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('errorMsg').style.display = 'none';
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';
        const url = isLogin ? '/api/auth/login' : '/api/auth/register';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.message || 'Terjadi kesalahan');

            if (isLogin) {
                if (remember) {
                    localStorage.setItem('token', data.token);
                } else {
                    sessionStorage.setItem('token', data.token);
                }
                window.location.href = '/';
            } else {
                alert('Registrasi berhasil! Silakan login.');
                toggleMode();
            }
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
