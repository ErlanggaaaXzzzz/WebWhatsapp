<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - WA Debugger Professional</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #111827;
            --border: rgba(255, 255, 255, 0.05);
            --primary: #00ff87;
            --primary-glow: rgba(0, 255, 135, 0.15);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #0f172a 0%, var(--bg) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Container Card Premium dengan Top Glowing Bar */
        .container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        /* Neon top-border decoration */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 12px var(--primary);
        }

        /* Branding Text Form */
        .brand-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #fff;
        }
        .brand-title span {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }
        
        #formTitle {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form Components */
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; font-weight: 600; }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Control Utilities */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
        }
        .remember-me input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        /* Professional Glow Button */
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #030712;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            box-shadow: 0 4px 15px var(--primary-glow);
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }

        /* Link Toggles */
        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .toggle-text span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .toggle-text span:hover {
            text-decoration: underline;
        }

        /* Clean Box Alert Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            line-height: 1.4;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container" id="authBox">
    <div class="brand-title"><span>WA</span> DEBUGGER</div>
    <div id="formTitle">LOGIN SUITE</div>
    
    <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required minlength="4" autocomplete="username" placeholder="Masukkan username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="remember-me" id="rememberGroup">
            <input type="checkbox" id="remember">
            <label for="remember" style="margin:0; cursor:pointer;">Ingat login saya di perangkat ini</label>
        </div>
        <button type="submit" id="btnSubmit">Masuk ke Dashboard</button>
        <div class="error-msg" id="errorMsg"></div>
    </form>
    
    <div class="toggle-text">
        <span id="toggleAuth" onclick="toggleMode()">Belum memiliki akun? Buat Baru</span>
    </div>
</div>

<script>
    let isLogin = true;
    
    // Proteksi Token Otomatis (Jika sudah login langsung buang ke dashboard)
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    if (token) window.location.href = '/';

    // Handler Animasi Toggle Antara Mode Login & Register
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('formTitle').innerText = isLogin ? 'LOGIN SUITE' : 'ACCOUNT REGISTRATION';
        document.getElementById('btnSubmit').innerText = isLogin ? 'Masuk ke Dashboard' : 'Daftarkan Akun Baru';
        document.getElementById('toggleAuth').innerText = isLogin ? 'Belum memiliki akun? Buat Baru' : 'Sudah memiliki akun? Masuk Saja';
        document.getElementById('rememberGroup').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('errorMsg').style.display = 'none';
    }

    // Pemrosesan Pengiriman Form Data ke Kluster Autentikasi API
    async function handleSubmit(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';
        const url = isLogin ? '/api/auth/login' : '/api/auth/register';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.message || 'Gagal memproses otentikasi kredensial.');

            if (isLogin) {
                // Alokasikan token JWT berdasarkan preferensi "Remember Login" user
                if (remember) {
                    localStorage.setItem('token', data.token);
                } else {
                    sessionStorage.setItem('token', data.token);
                }
                window.location.href = '/';
            } else {
                alert('Registrasi akun berhasil dikonfirmasi! Silakan masuk.');
                toggleMode();
            }
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
